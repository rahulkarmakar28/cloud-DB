version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       dbcloud
      POSTGRES_USER:     dbcloud
      POSTGRES_PASSWORD: dbcloud_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbcloud"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

